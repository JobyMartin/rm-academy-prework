<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etch-a-Sketch</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <h1>Etch-a-Sketch</h1>
  <h2>Draw anything you want, just by hovering over the grid!</h2>
  <div id="controls">
    <label for="gridSizeInput">Grid size</label>
    <input id="gridSizeInput" type="number" min="4" max="100" value="16" />
    <button id="resizeButton">Resize grid</button>
  </div>

  <div id="grid"></div>
</body>
</html>
